<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Chat</title>

    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link href="https://fonts.googleapis.com/css?family=Quicksand" rel="stylesheet">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>

    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #f5f5f5;
            font-family: 'Quicksand', sans-serif;
        }

        .chat-page {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-wrapper {
            width: 980px;
            height: 720px;
            background: #fff;
            border: 1px solid #ddd;
            display: grid;
            grid-template-columns: 320px 1fr;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }

        .chat-sidebar {
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .chat-sidebar-header {
            height: 58px;
            padding: 0 18px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-title {
            color: #ee4d2d;
            font-size: 22px;
            font-weight: 700;
        }

        .chat-count {
            font-size: 13px;
            color: #ee4d2d;
        }

        .chat-search-box {
            padding: 14px 16px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #f1f1f1;
        }

        .chat-search {
            flex: 1;
            height: 38px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 0 12px;
            outline: none;
            font-size: 14px;
        }

        .chat-filter {
            border: none;
            background: #fff;
            color: #555;
            font-size: 14px;
        }

        .room-list {
            flex: 1;
            overflow-y: auto;
        }

        .room-item {
            display: flex;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f6f6f6;
            position: relative;
        }

        .room-item:hover,
        .room-item.active {
            background: #fff7f4;
        }

        .room-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .room-info {
            flex: 1;
            overflow: hidden;
        }

        .room-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-name {
            font-size: 14px;
            font-weight: 700;
            color: #222;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .room-date {
            color: #888;
            font-size: 12px;
            margin-left: 8px;
        }

        .room-last {
            color: #777;
            font-size: 13px;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .room-badge {
            position: absolute;
            right: 16px;
            bottom: 14px;
            background: #ee4d2d;
            color: #fff;
            font-size: 11px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-main {
            display: flex;
            flex-direction: column;
            background: #f7f7f7;
        }

        .chat-main-header {
            height: 58px;
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 0 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-shop-name {
            font-size: 16px;
            font-weight: 700;
        }

        .chat-shop-status {
            font-size: 12px;
            color: #888;
        }

        .chat-actions i {
            color: #555;
            margin-left: 14px;
            cursor: pointer;
        }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            text-align: center;
        }

        .chat-empty-icon {
            width: 170px;
            height: 120px;
            border: 6px solid #bbb;
            border-radius: 12px;
            position: relative;
            margin-bottom: 20px;
        }

        .chat-empty-icon::before {
            content: "";
            position: absolute;
            width: 70px;
            height: 32px;
            background: #2f80ed;
            border-radius: 5px;
            left: 30px;
            top: 25px;
        }

        .chat-empty-icon::after {
            content: "...";
            position: absolute;
            width: 58px;
            height: 38px;
            background: #ee4d2d;
            color: #fff;
            border-radius: 8px;
            right: -28px;
            top: 42px;
            font-size: 28px;
            line-height: 26px;
        }

        .chat-empty h4 {
            color: #444;
            font-size: 18px;
            font-weight: 700;
        }

        .chat-empty p {
            color: #bbb;
            font-size: 15px;
        }

        .chat-message-area {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
            overflow-x: hidden;
            display: none;
            background: #f7f7f7;
        }

        .msg-row {
            display: flex;
            margin-bottom: 10px;
            align-items: flex-end;
            gap: 8px;
        }

        .msg-row.mine {
            justify-content: flex-end;
        }

        .msg-bubble {
            max-width: 60%;
            padding: 9px 14px;
            background: #fff;
            border-radius: 18px 18px 18px 4px;
            color: #222;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            word-wrap: break-word;
            box-shadow: 0 1px 3px rgba(0,0,0,.07);
        }

        .msg-row.mine .msg-bubble {
            background: #ee4d2d;
            color: #fff;
            border-radius: 18px 18px 4px 18px;
        }

        .chat-input-area {
            display: none;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 12px;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            height: 40px;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 0 14px;
            outline: none;
        }

        .chat-input-area button {
            border: none;
            background: #ee4d2d;
            color: #fff;
            height: 40px;
            padding: 0 18px;
            border-radius: 20px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="chat-page">
        <div class="chat-wrapper">

            <div class="chat-sidebar">
                <div class="chat-sidebar-header">
                    <div>
                        <span class="chat-title">Chat</span>
                        <span class="chat-count" id="chatCount">(0)</span>
                    </div>
                    <i class="fa fa-external-link"></i>
                </div>

                <div class="chat-search-box">
                    <input id="searchRoomInput" onkeyup="filterRooms()" class="chat-search"
                        placeholder="TÃ¬m theo tÃªn shop">
                    <button class="chat-filter">Táº¥t cáº£ <i class="fa fa-angle-down"></i></button>
                </div>

                <div class="room-list" id="roomList"></div>
            </div>

            <div class="chat-main">
                <div class="chat-main-header">
                    <div>
                        <div class="chat-shop-name" id="chatShopName">Shopee Chat</div>
                        <div class="chat-shop-status" id="chatShopStatus">Chá»n shop Ä‘á»ƒ báº¯t Ä‘áº§u nháº¯n tin</div>
                    </div>

                    <div class="chat-actions">
                        <i class="fa fa-refresh" onclick="reloadCurrentChat()"></i>
                        <i class="fa fa-window-minimize"></i>
                    </div>
                </div>

                <div class="chat-empty" id="chatEmpty">
                    <div class="chat-empty-icon"></div>
                    <h4>ChÃ o má»«ng báº¡n Ä‘áº¿n vá»›i Shop Chat</h4>
                    <p>HÃ£y chá»n má»™t shop Ä‘á»ƒ báº¯t Ä‘áº§u trÃ² chuyá»‡n</p>
                </div>

                <div class="chat-message-area" id="chatMessages"></div>

                <div class="chat-input-area" id="chatInputArea">
                    <input id="chatInput" onkeydown="handleEnterSend(event)" placeholder="Nháº­p tin nháº¯n...">
                    <button onclick="sendMessage()">Gá»­i</button>
                </div>
            </div>

        </div>
    </div>

    <!-- SockJS + STOMP (webjars) -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        const BASE_URL = "http://localhost:8080";
        const token    = localStorage.getItem("token");

        let stompClient    = null;
        let myId           = null;
        let allRooms       = [];
        let selectedRoom   = null; // { roomId, shopId, shopName, sellerUserId }

        /* â”€â”€ Init â”€â”€ */
        window.onload = async function () {
            if (!token) { alert("Báº¡n cáº§n Ä‘Äƒng nháº­p"); window.location.href = "/dangnhap"; return; }
            const info = await apiFetch("/api/chat/user/current-info");
            if (!info) return;
            myId = info.id;
            connectStomp();
            loadUserRooms();
        };

        /* â”€â”€ STOMP: subscribe /topic/chat/{myId} â”€â”€ */
        function connectStomp() {
            const sock  = new SockJS(BASE_URL + "/hello");
            stompClient = Stomp.over(sock);
            stompClient.debug = null;
            stompClient.connect({}, function () {
                stompClient.subscribe("/topic/chat/" + myId, function (frame) {
                    const msg = JSON.parse(frame.body);
                    if (selectedRoom && msg.roomId === selectedRoom.roomId) {
                        appendMsg(msg.content, false);
                    } else {
                        highlightRoom(msg.roomId);
                        if (typeof toastr !== "undefined") toastr.info("ðŸ’¬ Shop vá»«a gá»­i tin nháº¯n!");
                    }
                });
            });
        }

        /* â”€â”€ Rooms â”€â”€ */
        async function loadUserRooms() {
            allRooms = await apiFetch("/api/chat/user/rooms") || [];
            document.getElementById("chatCount").innerText = `(${allRooms.length})`;
            renderRoomList(allRooms);
        }

        function renderRoomList(rooms) {
            const box = document.getElementById("roomList");
            if (!rooms || rooms.length === 0) {
                box.innerHTML = `<div style="padding:16px;color:#777;">Báº¡n chÆ°a nháº¯n tin vá»›i shop nÃ o</div>`;
                return;
            }
            let html = "";
            rooms.forEach(r => {
                html += `<div class="room-item" id="room-${r.roomId}" onclick="selectRoom(${r.roomId})">
                    <img class="room-avatar" src="${r.shopAvatar || 'image/logo.ico'}" onerror="this.src='image/logo.ico'">
                    <div class="room-info">
                        <div class="room-top">
                            <div class="room-name">${escHtml(r.shopName || "Shop")}</div>
                        </div>
                        <div class="room-last" id="last-${r.roomId}">Nháº¥n Ä‘á»ƒ xem tin nháº¯n...</div>
                    </div>
                </div>`;
            });
            box.innerHTML = html;
        }

        function filterRooms() {
            const kw = document.getElementById("searchRoomInput").value.toLowerCase();
            const filtered = allRooms.filter(r => (r.shopName || "").toLowerCase().includes(kw));
            renderRoomList(filtered);
        }

        function highlightRoom(roomId) {
            const last = document.getElementById("last-" + roomId);
            if (last) { last.style.fontWeight = "700"; last.style.color = "#ee4d2d"; }
            if (!document.getElementById("room-" + roomId)) loadUserRooms();
        }

        /* â”€â”€ Select room â”€â”€ */
        async function selectRoom(roomId) {
            selectedRoom = allRooms.find(r => r.roomId === roomId);
            if (!selectedRoom) return;

            document.querySelectorAll(".room-item").forEach(e => e.classList.remove("active"));
            const el = document.getElementById("room-" + roomId);
            if (el) el.classList.add("active");

            document.getElementById("chatShopName").innerText = selectedRoom.shopName || "Shop";
            document.getElementById("chatShopStatus").innerText = "Äang hoáº¡t Ä‘á»™ng";
            document.getElementById("chatEmpty").style.display     = "none";
            document.getElementById("chatMessages").style.display  = "block";
            document.getElementById("chatInputArea").style.display = "flex";

            const last = document.getElementById("last-" + roomId);
            if (last) { last.style.fontWeight = ""; last.style.color = ""; }

            await loadMessages();
        }

        /* â”€â”€ Messages â”€â”€ */
        async function loadMessages() {
            if (!selectedRoom) return;
            const msgs = await apiFetch(`/api/chat/user/messages?shopId=${selectedRoom.shopId}`) || [];
            const box  = document.getElementById("chatMessages");
            box.innerHTML = "";
            msgs.forEach(m => appendMsg(m.content, m.mine, false));
            box.scrollTop = box.scrollHeight;
        }

        function appendMsg(content, mine, scroll = true) {
            const box = document.getElementById("chatMessages");
            const row = document.createElement("div");
            row.className = "msg-row" + (mine ? " mine" : "");
            row.innerHTML = `<div class="msg-bubble">${escHtml(content)}</div>`;
            box.appendChild(row);
            if (scroll) box.scrollTop = box.scrollHeight;
        }

        /* â”€â”€ Send (REST POST + server push WS notification to seller) â”€â”€ */
        async function sendMessage() {
            const input   = document.getElementById("chatInput");
            const content = input.value.trim();
            if (!content || !selectedRoom) return;

            const body = {
                shopId: selectedRoom.shopId,
                content: content,
                sellerUserId: selectedRoom.sellerUserId  // server push WS Ä‘áº¿n seller
            };

            const res = await fetch(BASE_URL + "/api/chat/user/send", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                appendMsg(content, true);
                input.value = "";
                const last = document.getElementById("last-" + selectedRoom.roomId);
                if (last) { last.textContent = content; last.style.fontWeight = ""; }
            }
        }

        function reloadCurrentChat() {
            if (selectedRoom) loadMessages(); else loadUserRooms();
        }

        function handleEnterSend(e) { if (e.key === "Enter") sendMessage(); }

        /* â”€â”€ Helpers â”€â”€ */
        async function apiFetch(path) {
            try {
                const r = await fetch(BASE_URL + path, { headers: { "Authorization": "Bearer " + token } });
                return r.ok ? await r.json() : null;
            } catch { return null; }
        }
        function escHtml(t) {
            return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        }
    </script>
</body>
</html>
