<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Sellora</title>
    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/user-modern.css">
    <link rel="stylesheet" type="text/css" href="css/dangki.css">
    <script src="js/main.js"></script>
    <script src="js/user.js"></script>
    <script>
        window.onload = function () {
            // No menu needed for auth pages
        }
    </script>
</head>

<body>
    <div class="user-auth-page">
        <div class="auth-card">
            <div class="auth-visual">
                <img src="image/logo.png" alt="Sellora">
                <div class="auth-visual-text">
                    <h3>Chào mừng trở lại!</h3>
                    <p>Đăng nhập để trải nghiệm mua sắm tuyệt vời cùng hàng ngàn sản phẩm chính hãng.</p>
                </div>
            </div>
            <div class="auth-form-section">
                <h2 class="auth-form-title">Đăng Nhập</h2>
                <p class="auth-form-subtitle">Nhập thông tin tài khoản của bạn để tiếp tục</p>
                <form action="javascript:login()" autocomplete="off" id="loginForm">
                    <div class="auth-input-group">
                        <label>Tên tài khoản</label>
                        <input type="text" id="username" placeholder="Nhập tên tài khoản">
                        <i class="fas fa-user input-icon"></i>
                        <!-- Thêm dòng này -->
                        <span class="error-msg" id="error-username"></span>
                    </div>
                    <div class="auth-input-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="password" placeholder="Nhập mật khẩu">
                        <i class="fas fa-lock input-icon"></i>
                        <!-- Thêm dòng này -->
                        <span class="error-msg" id="error-password"></span>
                    </div>
                    <div class="auth-btn-row">
                        <button type="submit" class="auth-btn-primary">Đăng Nhập</button>
                        <button type="button" onclick="window.location.href='dangky'" class="auth-btn-secondary">Đăng
                            Ký</button>
                    </div>
                </form>
                <div class="auth-divider">
                    <span>hoặc</span>
                </div>
                <div class="auth-google-wrap">
                    <div id="g_id_onload"
                        data-client_id="663646080535-l004tgn5o5cpspqdglrl3ckgjr3u8nbf.apps.googleusercontent.com"
                        data-callback="handleCredentialResponse"></div>
                    <div class="g_id_signin" data-logo_alignment="left"></div>
                </div>
                <a href="quenmatkhau" class="auth-forgot-link">Quên mật khẩu?</a>
            </div>
        </div>
    </div>

</body>
<script src="https://accounts.google.com/gsi/client" async defer></script>

</html>
