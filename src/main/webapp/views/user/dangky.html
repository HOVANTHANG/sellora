<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Sellora</title>
    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/user-modern.css">
    <link rel="stylesheet" type="text/css" href="css/dangki.css">
    <script src="js/main.js"></script>
    <script src="js/user.js"></script>
    <script>
        window.onload = function () {
            // No menu needed for auth pages
        }
    </script>
</head>

<body>
    <div class="user-auth-page">
        <div class="auth-card">
            <div class="auth-visual">
                <img src="image/logo.png" alt="Sellora">
                <div class="auth-visual-text">
                    <h3>Tạo tài khoản mới</h3>
                    <p>Đăng ký ngay để nhận nhiều ưu đãi hấp dẫn và mua sắm dễ dàng hơn.</p>
                </div>
            </div>
            <div class="auth-form-section">
                <h2 class="auth-form-title">Đăng Ký</h2>
                <p class="auth-form-subtitle">Điền thông tin bên dưới để tạo tài khoản</p>
                <form action="javascript:regis()" autocomplete="off" id="registerForm">
                    <div class="auth-input-group">
                        <label>Họ tên</label>
                        <input type="text" id="fullname" placeholder="Nhập họ và tên">
                        <i class="fas fa-user input-icon"></i>
                        <!-- Thêm dòng này -->
                        <span class="error-msg" id="error-fullname"></span>
                    </div>
                    <div class="auth-input-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Nhập email của bạn">
                        <i class="fas fa-envelope input-icon"></i>
                        <!-- Thêm dòng này -->
                        <span class="error-msg" id="error-email"></span>
                    </div>
                    <div class="auth-input-group">
                        <label>Số điện thoại</label>
                        <input type="tel" id="phone" placeholder="Nhập số điện thoại">
                        <i class="fas fa-phone input-icon"></i>
                        <!-- Thêm dòng này -->
                        <span class="error-msg" id="error-phone"></span>
                    </div>
                    <div class="auth-input-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="password" placeholder="Nhập mật khẩu">
                        <i class="fas fa-lock input-icon"></i>
                        <!-- Thêm dòng này -->
                        <span class="error-msg" id="error-password"></span>
                    </div>
                    <div class="auth-input-group">
                        <label>Nhập lại mật khẩu</label>
                        <input type="password" id="repassword" placeholder="Xác nhận mật khẩu">
                        <i class="fas fa-shield-alt input-icon"></i>
                        <!-- Thêm dòng này -->
                        <span class="error-msg" id="error-repassword"></span>
                    </div>
                    <div class="auth-btn-row">
                        <button type="submit" class="auth-btn-primary">Đăng Ký</button>
                        <button type="button" onclick="window.location.href='dangnhap'" class="auth-btn-secondary">Đăng
                            Nhập</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
