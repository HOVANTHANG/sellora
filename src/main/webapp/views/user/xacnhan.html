<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận tài khoản - Sellora</title>
    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/user-modern.css">
    <script src="js/main.js"></script>
    <script src="js/user.js"></script>
</head>

<body>
    <div class="user-auth-page">
        <div class="auth-card" style="max-width:700px; min-height:auto;">
            <div class="auth-visual" style="width:35%;">
                <img src="image/logo.png" alt="Bảo Ngọc Mobile" style="max-width:140px;">
                <div class="auth-visual-text">
                    <h3 style="font-size:18px;">Xác nhận tài khoản</h3>
                    <p style="font-size:13px;">Nhập mã xác thực đã được gửi đến email của bạn.</p>
                </div>
            </div>
            <div class="auth-form-section" style="width:65%; padding:40px 35px;">
                <h2 class="auth-form-title" style="font-size:24px;">Xác Nhận Đăng Ký</h2>
                <p class="auth-form-subtitle">Nhập mã xác nhận để kích hoạt tài khoản</p>
                <form action="javascript:confirmAccount()" autocomplete="off">
                    <div class="auth-input-group">
                        <label>Mã xác nhận</label>
                        <input required id="maxacthuc" placeholder="Nhập mã xác nhận từ email">
                        <i class="fas fa-key input-icon"></i>
                    </div>
                    <div class="auth-btn-row">
                        <button type="submit" class="auth-btn-primary">Xác nhận</button>
                        <button type="button" onclick="window.location.href='dangnhap'" class="auth-btn-secondary">Đăng
                            nhập</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
