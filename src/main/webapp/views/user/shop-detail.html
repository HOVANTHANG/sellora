<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gian hàng</title>

    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css?family=Quicksand" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/shop-detail.css">
    <link rel="stylesheet" href="css/chat-widget.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>

    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>

    <!-- SockJS + STOMP (required by chat-widget.js) -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script src="js/main.js"></script>

    <style>
        .shop-stat-item.review-clickable {
            cursor: pointer;
            transition: 0.2s;
            border-radius: 10px;
            padding: 8px;
        }

        .shop-stat-item.review-clickable:hover {
            background: #fff3ed;
            color: #ee4d2d;
        }

        .shop-review-summary {
            background: #fff7f2;
            border: 1px solid #ffd8cc;
            border-radius: 14px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .shop-review-score {
            font-size: 36px;
            font-weight: 800;
            color: #ee4d2d;
            line-height: 1;
        }

        .shop-review-score span {
            font-size: 16px;
            font-weight: 700;
        }

        .shop-review-stars {
            color: #ffc107;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .shop-review-count {
            font-weight: 700;
            color: #555;
        }

        .shop-review-list {
            max-height: 520px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .shop-review-item {
            display: flex;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid #eee;
        }

        .shop-review-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #eee;
            flex-shrink: 0;
        }

        .shop-review-user {
            font-weight: 800;
            color: #222;
        }

        .shop-review-date {
            font-size: 13px;
            color: #999;
            margin-top: 2px;
        }

        .shop-review-content {
            margin-top: 8px;
            color: #333;
            line-height: 1.6;
            white-space: pre-line;
        }

        .empty-shop-review {
            text-align: center;
            color: #999;
            background: #fafafa;
            border-radius: 12px;
            padding: 30px;
        }
    </style>
</head>

<body>
    <div id="headerweb"></div>

    <div class="contentweb shop-page">
        <div class="container">

            <div class="shop-header-card">
                <div class="shop-left">
                    <img id="shopAvatar" src="image/product1.webp" class="shop-avatar">

                    <div>
                        <div class="shop-name" id="shopName">Gian hàng</div>
                        <div class="shop-status">Online gần đây</div>

                        <div class="shop-actions">
                            <button class="btn-chat" onclick="openChatShop()">
                                <i class="fa fa-comments"></i> Chat Ngay
                            </button>

                            <button class="btn-back" onclick="history.back()">
                                <i class="fa fa-arrow-left"></i> Quay lại
                            </button>
                        </div>
                    </div>
                </div>

                <div class="shop-divider"></div>

                <div class="shop-stats">
                    <div class="shop-stat-item review-clickable" onclick="openShopReviewModal()">
                        <span>Đánh Giá</span>
                        <b id="shopReviewCountText">0</b>
                    </div>
                    <div class="shop-stat-item">
                        <span>Tỉ Lệ Phản Hồi</span>
                        <b>100%</b>
                    </div>
                    <div class="shop-stat-item">
                        <span>Tham Gia</span>
                        <b>5 năm trước</b>
                    </div>
                    <div class="shop-stat-item">
                        <span>Sản Phẩm</span>
                        <b id="shopProductCount">0</b>
                    </div>
                    <div class="shop-stat-item">
                        <span>Thời Gian Phản Hồi</span>
                        <b>trong vài giờ</b>
                    </div>
                    <div class="shop-stat-item">
                        <span>Người Theo Dõi</span>
                        <b>524</b>
                    </div>
                </div>
            </div>

            <div class="shop-toolbar">
                <h4>Sản phẩm của shop</h4>
                <span id="totalProductText">0 sản phẩm</span>
            </div>

            <div class="row g-3" id="shopProductList"></div>

            <ul class="pagination shop-pagination" id="shopPagination"></ul>

        </div>
    </div>

    <div class="container" id="footer"></div>

    <!-- MODAL DANH SÁCH ĐÁNH GIÁ SHOP -->
    <div class="modal fade" id="shopReviewModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fa fa-star text-warning"></i>
                        Đánh giá shop
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="shop-review-summary">
                        <div class="shop-review-score">
                            <span id="shopAvgStar">0.0</span><span>/5</span>
                        </div>

                        <div>
                            <div id="shopAvgStarText" class="shop-review-stars">★★★★★</div>
                            <div id="shopTotalReviewText" class="shop-review-count">0 đánh giá</div>
                        </div>
                    </div>

                    <div id="shopReviewList" class="shop-review-list">
                        <div class="empty-shop-review">Đang tải đánh giá...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "http://localhost:8080";

        let currentShopId = null;
        let currentShop = null;
        let currentPage = 0;
        let size = 12;
        let totalPage = 0;
        let shopReviewsCache = null;

        window.onload = function () {
            if (typeof loadMenu === "function") {
                loadMenu();
            }
            loadShopProducts(0);
            loadShopReviewSummary();
        };

        function getShopIdFromUrl() {
            const url = new URL(window.location.href);
            return url.searchParams.get("id");
        }

        function formatmoney(amount) {
            return Number(amount || 0).toLocaleString("vi-VN") + " ₫";
        }

        function buildStars(star) {
            let html = "";
            const n = Number(star || 0);

            for (let i = 1; i <= 5; i++) {
                html += i <= n ? "★" : "☆";
            }

            return html;
        }

        async function loadShopProducts(page = 0) {
            currentShopId = getShopIdFromUrl();
            currentPage = page;

            if (!currentShopId) {
                toastr.warning("Không tìm thấy shop");
                return;
            }

            const listBox = document.getElementById("shopProductList");
            listBox.innerHTML = `
                <div class="col-12">
                    <div class="loading-shop">Đang tải sản phẩm...</div>
                </div>
            `;

            const url = `${BASE_URL}/api/product/public/find-by-shop?shopId=${currentShopId}&page=${page}&size=${size}`;

            try {
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error("Không tải được sản phẩm của shop");
                }

                const result = await response.json();

                const products = result.content || [];
                totalPage = result.totalPages || 0;

                renderShopInfo(products, result.totalElements || 0);
                renderShopProducts(products);
                renderPagination();

                window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                });

            } catch (error) {
                console.error(error);
                toastr.error("Không tải được gian hàng");

                listBox.innerHTML = `
                    <div class="col-12">
                        <div class="empty-shop">Không tải được sản phẩm của shop</div>
                    </div>
                `;
            }
        }

        function renderShopInfo(products, totalProduct) {
            const firstProduct = products && products.length > 0 ? products[0] : null;

            if (firstProduct && firstProduct.shop) {
                currentShop = firstProduct.shop;

                document.getElementById("shopName").innerText =
                    currentShop.shopName || currentShop.name || "Gian hàng";

                document.getElementById("shopAvatar").src =
                    currentShop.avatar || currentShop.image || currentShop.logo || "image/logo.ico";
            } else {
                document.getElementById("shopName").innerText = "Gian hàng";
                document.getElementById("shopAvatar").src = "image/logo.ico";
            }

            document.getElementById("shopProductCount").innerText = totalProduct;
            document.getElementById("totalProductText").innerText = totalProduct + " sản phẩm";
        }

        function renderShopProducts(products) {
            const box = document.getElementById("shopProductList");

            if (!products || products.length === 0) {
                box.innerHTML = `
                    <div class="col-12">
                        <div class="empty-shop">
                            Shop này chưa có sản phẩm nào
                        </div>
                    </div>
                `;
                return;
            }

            let html = "";

            products.forEach(item => {
                html += `
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6">
                        <div class="shop-product-card">
                            <a href="detail?id=${item.id}">
                                <img class="shop-product-img"
                                     src="${item.imageBanner || 'image/product1.webp'}">
                            </a>

                            <div class="shop-product-body">
                                <a class="shop-product-name" href="detail?id=${item.id}">
                                    ${item.name || ""}
                                </a>

                                <div>
                                    <span class="shop-product-price">
                                        ${formatmoney(item.price || 0)}
                                    </span>
                                    ${item.oldPrice
                        ? `<span class="shop-product-oldprice">${formatmoney(item.oldPrice)}</span>`
                        : ""
                    }
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            box.innerHTML = html;
        }

        function renderPagination() {
            const pagination = document.getElementById("shopPagination");

            if (!pagination || totalPage <= 1) {
                pagination.innerHTML = "";
                return;
            }

            let html = "";

            html += `
                <li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="loadShopProducts(${currentPage - 1})">
                        Trước
                    </a>
                </li>
            `;

            for (let i = 0; i < totalPage; i++) {
                html += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="javascript:void(0)" onclick="loadShopProducts(${i})">
                            ${i + 1}
                        </a>
                    </li>
                `;
            }

            html += `
                <li class="page-item ${currentPage + 1 >= totalPage ? 'disabled' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="loadShopProducts(${currentPage + 1})">
                        Sau
                    </a>
                </li>
            `;

            pagination.innerHTML = html;
        }

        async function loadShopReviews() {
            currentShopId = getShopIdFromUrl();

            if (!currentShopId) {
                return [];
            }

            if (shopReviewsCache) {
                return shopReviewsCache;
            }

            const res = await fetch(`${BASE_URL}/api/review/public/shop?shopId=${currentShopId}`);

            if (!res.ok) {
                throw new Error("Không tải được đánh giá shop");
            }

            shopReviewsCache = await res.json();
            return shopReviewsCache;
        }

        async function loadShopReviewSummary() {
            try {
                const list = await loadShopReviews();

                const count = list ? list.length : 0;
                document.getElementById("shopReviewCountText").innerText = count;

                if (!list || list.length === 0) {
                    return;
                }

                let totalStar = 0;
                list.forEach(item => totalStar += Number(item.star || 0));
                const avg = (totalStar / list.length).toFixed(1);

                document.getElementById("shopReviewCountText").innerText = count + " đánh giá";
            } catch (e) {
                console.error(e);
            }
        }

        async function openShopReviewModal() {
            const modal = new bootstrap.Modal(document.getElementById("shopReviewModal"));
            modal.show();

            document.getElementById("shopReviewList").innerHTML =
                `<div class="empty-shop-review">Đang tải đánh giá...</div>`;

            try {
                const list = await loadShopReviews();
                renderShopReviews(list);
            } catch (e) {
                console.error(e);
                document.getElementById("shopReviewList").innerHTML =
                    `<div class="empty-shop-review">Không tải được đánh giá shop</div>`;
            }
        }

        function renderShopReviews(list) {
            let html = "";
            let totalStar = 0;

            if (!list || list.length === 0) {
                document.getElementById("shopAvgStar").innerText = "0.0";
                document.getElementById("shopAvgStarText").innerText = "★★★★★";
                document.getElementById("shopTotalReviewText").innerText = "0 đánh giá";
                document.getElementById("shopReviewList").innerHTML =
                    `<div class="empty-shop-review">Shop chưa có đánh giá nào</div>`;
                return;
            }

            list.forEach(item => {
                const star = Number(item.star || 0);
                totalStar += star;

                html += `
                    <div class="shop-review-item">
                        <img src="image/avatar.png"
                             class="shop-review-avatar"
                             onerror="this.src='image/logo.ico'">

                        <div style="flex:1">
                            <div class="shop-review-user">
                                ${item.fullname || item.username || "Người dùng"}
                            </div>

                            <div class="shop-review-stars">
                                ${buildStars(star)}
                            </div>

                            <div class="shop-review-date">
                                ${item.createdDate || ""}
                            </div>

                            <div class="shop-review-content">
                                ${item.content || ""}
                            </div>
                        </div>
                    </div>
                `;
            });

            const avg = (totalStar / list.length).toFixed(1);

            document.getElementById("shopAvgStar").innerText = avg;
            document.getElementById("shopAvgStarText").innerText = buildStars(Math.round(avg));
            document.getElementById("shopTotalReviewText").innerText = list.length + " đánh giá";
            document.getElementById("shopReviewCountText").innerText = list.length + " đánh giá";
            document.getElementById("shopReviewList").innerHTML = html;
        }

        function openChatShop() {
            if (!currentShop || !currentShop.id) {
                toastr.warning("Không tìm thấy shop");
                return;
            }

            openChatWithShop(currentShop);
        }
    </script>

    <script src="js/chat-widget.js"></script>
</body>

</html>
