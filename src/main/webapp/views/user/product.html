<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm — Sellora</title>
    <meta name="description"
        content="Khám phá hàng nghìn sản phẩm chính hãng tại Sellora. Lọc theo thương hiệu, danh mục và mức giá.">
    <link rel="shortcut icon" href="image/logo.ico">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.3/dist/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <script src="/webjars/sockjs-client/sockjs.min.js"></script>
    <script src="/webjars/stomp-websocket/stomp.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/user-modern.css">
    <link rel="stylesheet" href="css/product1.css">

    <script src="js/main.js"></script>
    <script src="js/banner.js"></script>
    <script src="js/product.js"></script>
    <script src="js/category.js"></script>
    <script src="js/trademark.js"></script>



    <script>
        window.onload = function () {
            loadMenu();
            loadBanner();
            sanPhamByThuongHieuAndDanhMuc(0);
            loadAllCategory();
            loadAllTrademark();
            loadSanPhamBanChay(0);
        };
    </script>
</head>

<body>
    <div id="headerweb"></div>

    <div class="contentweb pro-page">
        <div class="container">

            <!-- Breadcrumb -->
            <nav class="pro-breadcrumb">
                <a href="index"><i class="fa-solid fa-house"></i> Trang chủ</a>
                <span class="sep"><i class="fa-solid fa-chevron-right"></i></span>
                <span style="color:var(--tx);font-weight:600">Sản phẩm</span>
            </nav>

            <!-- ===== Filter Bar ===== -->
            <div class="filter-bar">
                <div class="filter-bar-title">
                    <i class="fa-solid fa-sliders"></i> Tìm kiếm &amp; Lọc sản phẩm
                </div>
                <div class="filter-row">
                    <div class="filter-item" style="flex:2;min-width:180px">
                        <label>Tên sản phẩm</label>
                        <div class="filter-search-wrap">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input id="search" class="filter-input" placeholder="Nhập tên sản phẩm...">
                        </div>
                    </div>
                    <div class="filter-item">
                        <label>Thương hiệu</label>
                        <select id="thuonghieu" class="filter-input">
                            <option value="">Tất cả hãng</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>Danh mục</label>
                        <select id="danhmuc" class="filter-input">
                            <option value="">Tất cả danh mục</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>Mức giá</label>
                        <select id="mucgia" class="filter-input">
                            <option value="0-1000000000">Tất cả mức giá</option>
                            <option value="0-999999">Dưới 1 triệu</option>
                            <option value="1000000-2000000">1 – 2 triệu</option>
                            <option value="2000000-4000000">2 – 4 triệu</option>
                            <option value="4000000-6000000">4 – 6 triệu</option>
                            <option value="6000000-9000000">6 – 9 triệu</option>
                            <option value="9000000-12000000">9 – 12 triệu</option>
                            <option value="12000000-18000000">12 – 18 triệu</option>
                            <option value="18000000-180000000">Trên 18 triệu</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>Sắp xếp</label>
                        <select id="sort" class="filter-input">
                            <option value="id,desc">Mới nhất</option>
                            <option value="price,asc">Giá tăng dần</option>
                            <option value="price,desc">Giá giảm dần</option>
                            <option value="quantitySold,desc">Bán chạy nhất</option>
                        </select>
                    </div>
                    <div class="filter-item" style="flex:0;min-width:auto">
                        <label>&nbsp;</label>
                        <button onclick="locSpAction()" class="filter-btn" id="filterBtn">
                            <i class="fa-solid fa-magnifying-glass"></i> Lọc sản phẩm
                        </button>
                    </div>
                </div>
            </div>

            <!-- ===== Product search results ===== -->
            <div class="pro-section">
                <div class="pro-section-header">
                    <div class="pro-section-title">
                        <div class="pro-section-accent"></div>
                        Kết quả tìm kiếm
                        <span class="pro-section-badge">SẢN PHẨM</span>
                    </div>
                    <span class="pro-result-count" id="resultCount"></span>
                </div>

                <div class="row g-3" id="sanphamloc"></div>

                <div class="pro-more-wrap">
                    <button id="btnlocsanpham" class="pro-more-btn">
                        Xem thêm <i class="fa-solid fa-chevron-down"></i>
                    </button>
                </div>
            </div>

            <div class="pro-divider"></div>

            <!-- ===== Best sellers ===== -->
            <div class="pro-section">
                <div class="pro-section-header">
                    <div class="pro-section-title">
                        <div class="pro-section-accent" style="background:linear-gradient(135deg,#f59e0b,#d97706)">
                        </div>
                        Sản phẩm bán chạy
                        <span class="pro-section-badge"
                            style="background:linear-gradient(135deg,#f59e0b,#d97706)">HOT</span>
                    </div>
                </div>

                <div class="row g-3" id="sanphambanchay"></div>

                <div class="pro-more-wrap">
                    <button id="btnsanphambanchay" class="pro-more-btn">
                        Xem thêm <i class="fa-solid fa-chevron-down"></i>
                    </button>
                </div>
            </div>

        </div><!-- /.container -->
    </div>

    <div class="container" id="footer"></div>

    <script src="js/carousel.js"></script>

    <script>
        /* Enter key triggers filter */
        document.getElementById('search').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') locSpAction();
        });

        /* Override renderProductCard target containers to use CSS grid */
        /* The pro-grid uses CSS grid — Bootstrap cols not needed, so override col classes */
        var _origRender = typeof renderProductCard === 'function' ? renderProductCard : null;
    </script>
</body>

</html>
