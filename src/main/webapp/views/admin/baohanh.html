  <script>
    window.onload = function() {
    }
  </script>
</head>

<body class="sb-nav-fixed">
<nav id="top" class="sb-topnav navbar navbar-expand navbar-dark bg-dark"></nav>
<div id="layoutSidenav">
  <div id="layoutSidenav_nav"></div>
  <div id="layoutSidenav_content">
    <main class="main container-fluid p-4">

      <h1 class="mt-4 mb-3">Quản Lý Yêu Cầu Bảo Hành</h1>

      <div class="col-sm-12">
        <div class="wrapper">
          <div class="headertable d-flex justify-content-start align-items-center mb-3">
            <div class="divsearchtb">
              <label class="form-label me-2">Tìm kiếm:</label>
              <input id="searchtable" placeholder="Mã Yêu cầu, Tên KH, IMEI..." class="form-control d-inline-block w-auto">
            </div>
          </div>

          <div class="accordion" id="guaranteeListAccordion">
            <p class="text-center text-muted mt-3" id="loadingMessage">Đang tải dữ liệu...</p>
          </div>
        </div>

        <nav aria-label="Page navigation example" class="mt-4">
          <ul class="pagination justify-content-center" id="pageable"></ul>
        </nav>
      </div>
    </main>
  </div>
</div>



<div class="modal fade" id="guaranteeDetailModal" tabindex="-1" aria-labelledby="guaranteeDetailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="guaranteeDetailModalLabel"><i class="fas fa-tools me-2"></i>Chi tiết Yêu cầu Bảo hành #<span id="detailGuaranteeId"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">

        <div id="detailContent" class="mb-4"></div>

        <hr>

        <h5 class="mt-4 text-success">Cập nhật Chẩn đoán & Chi phí</h5>
        <form id="updateDiagnosisFeeForm">
          <input type="hidden" id="updateGuaranteeId">
          <div class="mb-3">
            <label for="newErrorDiagnosis" class="form-label">Chẩn đoán lỗi:</label>
            <textarea class="form-control" id="newErrorDiagnosis" rows="3" placeholder="Nhập kết quả chẩn đoán lỗi..."></textarea>
          </div>
          <div class="mb-3">
            <label for="newFee" class="form-label">Chi phí sửa chữa (VNĐ):</label>
            <input type="number" class="form-control" id="newFee" min="0" value="0">
          </div>
          <button type="submit" class="btn btn-success w-100"><i class="fas fa-save me-2"></i>Lưu Chẩn đoán & Chi phí</button>
        </form>

        <hr>

        <h5 class="mt-4 text-warning">Cập nhật Trạng thái</h5>
        <div class="d-flex align-items-center mb-3">
          <label class="form-label me-3 mb-0">Trạng thái mới:</label>
          <select class="form-select status-dropdown-modal" style="width: 50%;" id="updateStatusDropdown"></select>
        </div>
        <button type="button" class="btn btn-warning w-100" id="btnUpdateStatus"><i class="fas fa-sync-alt me-2"></i>Cập nhật Trạng thái</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
