<body class="sb-nav-fixed">
    <nav id="top" class="sb-topnav navbar navbar-expand navbar-dark bg-dark"></nav>
    <div id="layoutSidenav">
        <div id="layoutSidenav_nav"></div>
        <div id="layoutSidenav_content">
            <main class="container-fluid px-4">
                <h3 class="mt-4 mb-3">Thống kê shop</h3>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <div class="card p-3">
                            <span>Tổng doanh thu</span>
                            <h4 id="totalRevenue">0 đ</h4>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3">
                            <span>Tổng lợi nhuận</span>
                            <h4 id="totalProfit">0 đ</h4>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3">
                            <span>Tổng đơn hàng</span>
                            <h4 id="totalOrder">0</h4>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3">
                            <span>Tổng shop</span>
                            <h4 id="totalShop">0</h4>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <i class="fa fa-line-chart"></i>
                        Thống kê doanh thu / lợi nhuận theo shop
                    </div>

                    <div class="card-body">
                        <table class="table table-bordered table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Avatar</th>
                                    <th>Tên shop</th>
                                    <th>Trạng thái</th>
                                    <th>Sản phẩm</th>
                                    <th>Đơn hàng</th>
                                    <th>Doanh thu</th>
                                    <th>Lợi nhuận</th>
                                </tr>
                            </thead>

                            <tbody id="listShopStatistic">
                                <tr>
                                    <td colspan="7" class="text-center">Đang tải dữ liệu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>


</body>
<script>
    window.onload = function () {
        if (typeof loadMenu === "function") {
            loadMenu();
        }
        loadShopStatistic();
    };

    function formatmoney(amount) {
        return Number(amount || 0).toLocaleString("vi-VN") + " đ";
    }

    async function loadShopStatistic() {
        const token = localStorage.getItem("token");

        const res = await fetch("http://localhost:8080/api/admin/shop/statistic", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (!res.ok) {
            alert("Không tải được thống kê shop");
            return;
        }

        const list = await res.json();

        let html = "";
        let totalRevenue = 0;
        let totalProfit = 0;
        let totalOrder = 0;

        list.forEach(item => {
            totalRevenue += Number(item.revenue || 0);
            totalProfit += Number(item.profit || 0);
            totalOrder += Number(item.totalOrder || 0);

            html += `
                <tr>
                    <td>
                        <img src="${item.avatar || '/image/logo.ico'}"
                             onerror="this.src='/image/logo.ico'"
                             style="width:52px;height:52px;border-radius:50%;object-fit:cover;">
                    </td>
                    <td>${item.shopName || ""}</td>
                    <td>${item.status || ""}</td>
                    <td>${item.totalProduct || 0}</td>
                    <td>${item.totalOrder || 0}</td>
                    <td>${formatmoney(item.revenue || 0)}</td>
                    <td style="font-weight:bold;color:${Number(item.profit || 0) >= 0 ? 'green' : 'red'}">
                        ${formatmoney(item.profit || 0)}
                    </td>
                </tr>
            `;
        });

        document.getElementById("listShopStatistic").innerHTML =
            html || `<tr><td colspan="7" class="text-center">Chưa có dữ liệu</td></tr>`;

        document.getElementById("totalRevenue").innerText = formatmoney(totalRevenue);
        document.getElementById("totalProfit").innerText = formatmoney(totalProfit);
        document.getElementById("totalOrder").innerText = totalOrder;
        document.getElementById("totalShop").innerText = list.length;
    }
</script>

</html>
