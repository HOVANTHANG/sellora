<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Chat khách hàng</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="css/styles.css" rel="stylesheet" />
    <link href="/seller/css/seller-modern.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>

    <script src="/seller/js/menu1.js"></script>
    <script src="/seller/js/dashboard-shop.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ── Override seller-modern.css padding on main for chat page ── */
        #layoutSidenav_content main.seller-chat-page {
            padding: 0 !important;
        }

        body {
            background: #f0f4f8;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .seller-chat-page {
            padding: 0 !important;
            height: calc(100vh - 57px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .seller-chat-wrapper {
            flex: 1;
            margin: 16px;
            background: #fff;
            border-radius: 18px;
            display: grid;
            grid-template-columns: 340px 1fr;
            overflow: hidden;
            box-shadow: 0 14px 40px rgba(15, 23, 42, .09);
            border: 1px solid #e2e8f0;
            min-height: 0;
        }

        .chat-left {
            border-right: 1px solid #edf0f2;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .chat-left-header {
            padding: 18px 20px;
            border-bottom: 1px solid #edf0f2;
            background: linear-gradient(135deg, #0d9488, #065f46);
            color: #fff;
        }

        .chat-left-header h4 {
            margin: 0;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -.2px;
        }

        .chat-left-header span {
            color: rgba(255, 255, 255, .7);
            font-size: 12px;
        }

        .chat-search-box {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            background: #f8fafc;
        }

        .chat-search-box input {
            width: 100%;
            height: 38px;
            border: 1.5px solid #e2e8f0;
            border-radius: 999px;
            padding: 0 16px;
            outline: none;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            transition: border-color .2s;
        }

        .chat-search-box input:focus {
            border-color: #14b8a6;
        }

        .room-list {
            flex: 1;
            overflow-y: auto;
        }

        .room-item {
            display: flex;
            gap: 12px;
            padding: 14px 18px;
            cursor: pointer;
            border-bottom: 1px solid #f8fafc;
            transition: background .2s;
        }

        .room-item:hover {
            background: #f0fdfa;
        }

        .room-item.active {
            background: rgba(13, 148, 136, .08);
            border-left: 3px solid #0d9488;
        }

        .room-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e2e8f0;
        }

        .room-name {
            font-weight: 700;
            font-size: 14px;
            color: #1e293b;
        }

        .room-last {
            font-size: 12.5px;
            color: #94a3b8;
            margin-top: 3px;
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
            background: #f8fafc;
            min-width: 0;
            overflow: hidden;
        }

        .chat-panel-header {
            height: 68px;
            background: #fff;
            border-bottom: 1px solid #edf0f2;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-panel-header h5 {
            margin: 0;
            font-weight: 700;
            font-size: 15px;
            color: #1e293b;
        }

        .chat-panel-header span {
            color: #64748b;
            font-size: 12.5px;
        }

        .chat-panel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(13, 148, 136, .15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0d9488;
            font-size: 14px;
        }

        .seller-chat-body {
            flex: 1;
            min-height: 0;
            padding: 20px 24px;
            overflow-y: auto;
        }

        .empty-chat {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
        }

        .empty-chat i {
            font-size: 56px;
            margin-bottom: 14px;
        }

        .empty-chat p {
            font-size: 14px;
            color: #94a3b8;
        }

        .msg-row {
            display: flex;
            margin-bottom: 10px;
            align-items: flex-end;
            gap: 8px;
        }

        .msg-row.mine {
            justify-content: flex-end;
        }

        .msg-bubble {
            max-width: 62%;
            padding: 10px 15px;
            border-radius: 16px 16px 16px 4px;
            background: #fff;
            color: #1e293b;
            font-size: 13.5px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, .05);
            line-height: 1.5;
            word-break: break-word;
            word-wrap: break-word;
        }

        .msg-row.mine .msg-bubble {
            background: linear-gradient(135deg, #0d9488, #065f46);
            color: #fff;
            border-radius: 16px 16px 4px 16px;
        }


        .seller-chat-footer {
            background: #fff;
            border-top: 1px solid #edf0f2;
            padding: 14px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .seller-chat-footer input {
            flex: 1;
            height: 44px;
            border: 1.5px solid #e2e8f0;
            border-radius: 999px;
            padding: 0 20px;
            outline: none;
            font-size: 13.5px;
            font-family: 'Inter', sans-serif;
            transition: border-color .2s;
        }

        .seller-chat-footer input:focus {
            border-color: #14b8a6;
        }

        .seller-chat-footer button {
            border: none;
            background: linear-gradient(135deg, #0d9488, #065f46);
            color: #fff;
            padding: 0 22px;
            height: 44px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13.5px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity .2s;
        }

        .seller-chat-footer button:hover {
            opacity: .88;
        }
    </style>
</head>

<body class="sb-nav-fixed">

    <nav id="top" class="sb-topnav navbar navbar-expand navbar-dark bg-dark"></nav>

    <div id="layoutSidenav">
        <div id="layoutSidenav_nav"></div>

        <div id="layoutSidenav_content">
            <main class="seller-chat-page">
                <div class="seller-chat-wrapper">
                    <div class="chat-left">
                        <div class="chat-left-header">
                            <h4>Chat với khách hàng</h4>
                            <span id="roomCount">0 cuộc trò chuyện</span>
                        </div>

                        <div class="chat-search-box">
                            <input id="searchRoomInput" onkeyup="filterRooms()" placeholder="Tìm khách hàng...">
                        </div>

                        <div class="room-list" id="roomList"></div>
                    </div>

                    <div class="chat-panel">
                        <div class="chat-panel-header">
                            <div class="chat-panel-avatar"><i class="fas fa-user"></i></div>
                            <div>
                                <h5 id="chatTitle">Chọn một khách hàng bên trái để bắt đầu trò chuyện</h5>
                                <span id="chatSubTitle">Tin nhắn với khách hàng sẽ hiển thị tại đây</span>
                            </div>
                        </div>

                        <div class="seller-chat-body" id="sellerChatMessages">
                            <div class="empty-chat">
                                <i class="fas fa-comments"></i>
                                <p>Chọn một khách hàng bên trái để bắt đầu trò chuyện</p>
                            </div>
                        </div>

                        <div class="seller-chat-footer">
                            <input id="sellerChatInput" onkeydown="handleEnter(event)" placeholder="Nhập tin nhắn...">
                            <button onclick="sellerSendMessage()">Gửi</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- SockJS + STOMP (webjars) -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        const BASE_URL = "http://localhost:8080";
        // token is already declared globally by menu1.js

        let stompClient = null;
        let myId = null;
        let rooms = [];
        let selectedRoom = null; // { roomId, userId, username }

        /* Init */
        window.onload = async function () {
            const info = await apiFetch("/api/chat/seller/current-info");
            if (!info) { alert("Vui long dang nhap"); return; }
            myId = info.id;
            console.log("[Seller Chat] myId =", myId);
            connectStomp();
            loadSellerRooms();
        };

        /* STOMP */
        function connectStomp() {
            const sock = new SockJS(BASE_URL + "/hello");
            stompClient = Stomp.over(sock);
            stompClient.debug = null;
            stompClient.connect({}, function () {
                const topic = "/topic/chat/" + myId;
                console.log("[Seller Chat] subscribed:", topic);
                stompClient.subscribe(topic, function (frame) {
                    console.log("[Seller Chat] received:", frame.body);
                    const msg = JSON.parse(frame.body);
                    const incomingRoomId = Number(msg.roomId);
                    const currentRoomId = selectedRoom ? Number(selectedRoom.roomId) : null;
                    if (currentRoomId && incomingRoomId === currentRoomId) {
                        appendMsg(msg.content, false);
                    } else {
                        markUnread(incomingRoomId);
                        showToast("Co tin nhan moi tu khach hang!");
                    }
                });
            }, function (err) { console.error("[Seller Chat] STOMP error:", err); });
        }

        /* â”€â”€ Rooms â”€â”€ */
        async function loadSellerRooms() {
            rooms = await apiFetch("/api/chat/seller/rooms") || [];
            document.getElementById("roomCount").textContent = rooms.length + " cuộc trò chuyện";
            let html = "";
            rooms.forEach(r => {
                html += `<div class="room-item" id="room-${r.roomId}"
                              onclick="selectRoom(${r.roomId})">
                    <img class="room-avatar" src="/image/user.jpg">
                    <div class="room-info">
                        <div class="room-name">${escHtml(r.username || "Khách hàng")}</div>
                        <div class="room-last" id="last-${r.roomId}">Nhấn để xem tin nhắn</div>
                    </div>
                </div>`;
            });
            document.getElementById("roomList").innerHTML =
                html || `<div class="room-item">Chưa có khách hàng nhắn tin</div>`;
        }

        function filterRooms() {
            const kw = document.getElementById("searchRoomInput").value.toLowerCase();
            document.querySelectorAll(".room-item").forEach(el => {
                const name = el.querySelector(".room-name")?.textContent.toLowerCase() || "";
                el.style.display = name.includes(kw) ? "" : "none";
            });
        }

        function markUnread(roomId) {
            const el = document.getElementById("room-" + roomId);
            if (el) el.style.borderLeft = "3px solid #0d9488";
            if (!el) loadSellerRooms();
        }

        /* â”€â”€ Select room â”€â”€ */
        async function selectRoom(roomId) {
            selectedRoom = rooms.find(r => r.roomId === roomId);
            if (!selectedRoom) return;

            document.querySelectorAll(".room-item").forEach(e => e.classList.remove("active"));
            const el = document.getElementById("room-" + roomId);
            if (el) { el.classList.add("active"); el.style.borderLeft = ""; }

            document.getElementById("chatTitle").innerText = selectedRoom.username || "Khách hàng";
            document.getElementById("chatSubTitle").innerText = "Đang hoạt động";

            await loadMessages();
        }

        /* â”€â”€ Messages â”€â”€ */
        async function loadMessages() {
            if (!selectedRoom) return;
            const msgs = await apiFetch(`/api/chat/seller/messages?roomId=${selectedRoom.roomId}`) || [];
            const box = document.getElementById("sellerChatMessages");
            box.innerHTML = "";
            msgs.forEach(m => appendMsg(m.content, m.mine, false));
            box.scrollTop = box.scrollHeight;
        }

        function appendMsg(content, mine, scroll = true) {
            const box = document.getElementById("sellerChatMessages");
            const row = document.createElement("div");
            row.className = "msg-row" + (mine ? " mine" : "");
            row.innerHTML = `<div class="msg-bubble">${escHtml(content)}</div>`;
            box.appendChild(row);
            if (scroll) box.scrollTop = box.scrollHeight;
        }

        /* â”€â”€ Send (REST POST + server push WS notification) â”€â”€ */
        async function sellerSendMessage() {
            if (!selectedRoom) { alert("Chọn khách hàng trước"); return; }
            const input = document.getElementById("sellerChatInput");
            const content = input.value.trim();
            if (!content) return;

            const body = {
                roomId: selectedRoom.roomId,
                content: content,
                userId: selectedRoom.userId   // server sẽ push WS notification đến user này
            };

            const res = await fetch(BASE_URL + "/api/chat/seller/send", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                appendMsg(content, true);
                input.value = "";
                const last = document.getElementById("last-" + selectedRoom.roomId);
                if (last) last.textContent = content;
            } else {
                alert("Không gửi được tin nhắn");
            }
        }

        function handleEnter(e) { if (e.key === "Enter") sellerSendMessage(); }

        /* â”€â”€ Toast â”€â”€ */
        function showToast(msg) {
            if (typeof toastr !== "undefined") toastr.info(msg);
        }

        /* â”€â”€ Helpers â”€â”€ */
        async function apiFetch(path) {
            try {
                const r = await fetch(BASE_URL + path, { headers: { "Authorization": "Bearer " + token } });
                return r.ok ? await r.json() : null;
            } catch { return null; }
        }
        function escHtml(t) {
            return String(t || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>

</html>
