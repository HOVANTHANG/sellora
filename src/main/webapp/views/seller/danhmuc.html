<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Quản lý Danh mục</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/seller/css/seller-modern.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.3/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <script src="/seller/js/menu1.js"></script>
    <style>
        :root { --p:#0d9488;--p-lt:#14b8a6;--p-dk:#0f766e;--border:#e2e8f0;--card:#fff;--tx:#1e293b;--tx2:#64748b; }
        .dm-wrap { padding: 24px; }
        .dm-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
        .dm-toolbar h4 { margin:0; font-size:20px; font-weight:700; color:var(--tx); display:flex; align-items:center; gap:10px; }
        .dm-toolbar h4 i { color:var(--p); }
        .btn-add { background:var(--p); color:#fff; border:none; padding:9px 20px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:7px; transition:.2s; }
        .btn-add:hover { background:var(--p-dk); }
        .dm-search { display:flex; align-items:center; gap:8px; background:#f8fafc; border:1px solid var(--border); border-radius:8px; padding:7px 14px; }
        .dm-search input { border:none; background:transparent; outline:none; font-size:13px; width:220px; }
        .dm-tabs { display:flex; gap:4px; margin-bottom:16px; border-bottom:2px solid var(--border); }
        .dm-tab { padding:9px 20px; font-size:13px; font-weight:600; cursor:pointer; color:var(--tx2); border-bottom:2px solid transparent; margin-bottom:-2px; transition:.2s; }
        .dm-tab.active { color:var(--p); border-bottom-color:var(--p); }
        .dm-table { width:100%; border-collapse:separate; border-spacing:0; background:var(--card); border-radius:10px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,.06); }
        .dm-table th { background:#f8fafc; font-size:12px; font-weight:700; color:var(--tx2); padding:11px 14px; text-transform:uppercase; letter-spacing:.4px; border-bottom:1px solid var(--border); }
        .dm-table td { padding:11px 14px; font-size:13.5px; color:var(--tx); border-bottom:1px solid #f1f5f9; vertical-align:middle; }
        .dm-table tr:last-child td { border-bottom:none; }
        .dm-table tr:hover td { background:#f8fafc; }
        .badge-type { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; background:#e0f2fe; color:#0369a1; }
        .badge-sub { background:#fce7f3; color:#9d174d; }
        .action-btn { width:30px; height:30px; border:none; border-radius:7px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; font-size:13px; transition:.18s; }
        .btn-edit { background:#eff6ff; color:#3b82f6; } .btn-edit:hover { background:#3b82f6; color:#fff; }
        .btn-del  { background:#fef2f2; color:#ef4444; } .btn-del:hover  { background:#ef4444; color:#fff; }
        .btn-sub  { background:#f0fdf4; color:#16a34a; } .btn-sub:hover  { background:#16a34a; color:#fff; }
        .expand-row td { background:#f8fafc; }
        .sub-table { width:100%; font-size:13px; }
        .sub-table td { padding:8px 14px; border-bottom:1px solid #e2e8f0; color:var(--tx2); }
        .sub-table tr:last-child td { border:none; }
        .sub-img { width:36px; height:36px; object-fit:contain; border-radius:6px; background:#f1f5f9; border:1px solid var(--border); }
        .pg { display:flex; gap:5px; justify-content:center; margin-top:18px; }
        .pg-btn { min-width:34px; height:34px; border:1px solid var(--border); background:var(--card); border-radius:6px; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0 10px; }
        .pg-btn.active,.pg-btn:hover { background:var(--p); color:#fff; border-color:var(--p); }
        /* Modal */
        .modal-header { background:linear-gradient(135deg,var(--p),var(--p-dk)); }
        .modal-title { color:#fff; font-weight:700; }
        .btn-close { filter:invert(1); }
        .fm-label { font-size:13px; font-weight:600; color:var(--tx); margin-bottom:5px; display:block; }
        .fm-input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:9px 12px; font-size:13.5px; outline:none; transition:.2s; }
        .fm-input:focus { border-color:var(--p); box-shadow:0 0 0 3px rgba(13,148,136,.1); }
        .fm-group { margin-bottom:14px; }
        .btn-save { background:var(--p); color:#fff; border:none; padding:10px 28px; border-radius:8px; font-weight:700; font-size:14px; cursor:pointer; width:100%; transition:.2s; }
        .btn-save:hover { background:var(--p-dk); }
        .cat-img-preview { width:70px; height:70px; object-fit:contain; border-radius:8px; border:1px solid var(--border); margin-top:8px; display:none; }
        .empty-row td { text-align:center; color:var(--tx2); padding:40px; }
    </style>
</head>
<body class="sb-nav-fixed">
<nav id="top" class="sb-topnav navbar navbar-expand navbar-dark bg-dark"></nav>
<div id="layoutSidenav">
    <div id="layoutSidenav_nav"></div>
    <div id="layoutSidenav_content">
        <main class="main">
            <div class="dm-wrap">

                <!-- Toolbar -->
                <div class="dm-toolbar">
                    <h4><i class="fa-solid fa-layer-group"></i> Quản lý Danh mục</h4>
                    <div style="display:flex;gap:10px;flex-wrap:wrap">
                        <div class="dm-search">
                            <i class="fa-solid fa-magnifying-glass" style="color:var(--tx2)"></i>
                            <input id="searchInput" placeholder="Tìm theo tên..." oninput="onSearch()">
                        </div>
                        <button class="btn-add" onclick="openAdd(null)">
                            <i class="fa-solid fa-plus"></i> Thêm danh mục cha
                        </button>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="dm-tabs">
                    <div class="dm-tab active" id="tabAll" onclick="switchTab('all')">Tất cả</div>
                    <div class="dm-tab" id="tabParent" onclick="switchTab('parent')">Danh mục cha</div>
                    <div class="dm-tab" id="tabChild" onclick="switchTab('child')">Danh mục con</div>
                </div>

                <!-- Table -->
                <table class="dm-table">
                    <thead>
                        <tr>
                            <th style="width:50px">ID</th>
                            <th style="width:50px">Ảnh</th>
                            <th>Tên danh mục</th>
                            <th>Danh mục cha</th>
                            <th>Loại</th>
                            <th style="width:160px">Số danh mục con</th>
                            <th style="width:160px">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="catTableBody">
                        <tr><td colspan="7" style="text-align:center;padding:30px;color:#94a3b8">Đang tải...</td></tr>
                    </tbody>
                </table>

                <!-- Pagination -->
                <div class="pg" id="pagination"></div>

            </div>
        </main>
    </div>
</div>

<!-- ── MODAL Thêm/Sửa danh mục ── -->
<div class="modal fade" id="modalCat" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius:14px;overflow:hidden">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Thêm danh mục</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding:22px">
                <input type="hidden" id="catId">

                <div class="fm-group">
                    <label class="fm-label">Tên danh mục <span style="color:#ef4444">*</span></label>
                    <input class="fm-input" id="catName" placeholder="Nhập tên danh mục">
                </div>

                <div class="fm-group">
                    <label class="fm-label">Danh mục cha <span style="font-weight:400;color:#94a3b8;font-size:12px">(để trống nếu là danh mục cha)</span></label>
                    <select class="fm-input" id="catParent">
                        <option value="">-- Không có (là danh mục cha) --</option>
                    </select>
                </div>

                <div class="fm-group">
                    <label class="fm-label">Loại danh mục</label>
                    <select class="fm-input" id="catType">
                        <option value="">-- Chọn loại --</option>
                    </select>
                </div>

                <div class="fm-group">
                    <label class="fm-label">Ảnh danh mục</label>
                    <input type="file" accept="image/*" class="fm-input" id="catImgFile" onchange="previewCatImg(this)">
                    <input type="hidden" id="catImgUrl">
                    <img id="catImgPreview" class="cat-img-preview">
                </div>

                <button class="btn-save" onclick="saveCategory()">
                    <i class="fa-solid fa-floppy-disk me-2"></i> Lưu danh mục
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const BASE = "http://localhost:8080";
const API  = BASE + "/api/category";
const UPLOAD_API = BASE + "/api/public/upload-file";

let allCats    = [];
let filteredCats = [];
let currentTab = "all";
let currentPage = 0;
const pageSize  = 15;
let modalInstance = null;

window.onload = async function () {
    if (typeof loadMenu === "function") loadMenu();
    await loadAllData();
    modalInstance = new bootstrap.Modal(document.getElementById("modalCat"));
};

// ── Load tất cả dữ liệu ──────────────────────────────────────────────────────
async function loadAllData() {
    try {
        const [catRes, typeRes] = await Promise.all([
            fetch(API + "/public/findAll"),
            fetch(API + "/public/get-all-category-type")
        ]);
        allCats = catRes.ok ? await catRes.json() : [];

        // Điền loại danh mục vào select
        if (typeRes.ok) {
            const types = await typeRes.json();
            const sel = document.getElementById("catType");
            sel.innerHTML = '<option value="">-- Chọn loại --</option>';
            types.forEach(t => {
                sel.innerHTML += `<option value="${t}">${t}</option>`;
            });
        }

        applyFilter();
    } catch(e) {
        console.error(e);
        toastr.error("Không tải được dữ liệu");
    }
}

// ── Lọc + phân trang ─────────────────────────────────────────────────────────
function applyFilter() {
    const q = (document.getElementById("searchInput").value || "").toLowerCase();
    filteredCats = allCats.filter(c => {
        const nameMatch = (c.name || "").toLowerCase().includes(q);
        if (currentTab === "parent") return nameMatch && !c.parentId;
        if (currentTab === "child")  return nameMatch && !!c.parentId;
        return nameMatch;
    });
    currentPage = 0;
    render();
}

function onSearch() { applyFilter(); }

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".dm-tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add("active");
    applyFilter();
}

function render() {
    const tbody = document.getElementById("catTableBody");
    const start = currentPage * pageSize;
    const page  = filteredCats.slice(start, start + pageSize);

    if (page.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:#94a3b8">Không có danh mục nào</td></tr>`;
        renderPagination();
        return;
    }

    tbody.innerHTML = page.map(cat => {
        const parentName = cat.parentId
            ? (allCats.find(c => Number(c.id) === Number(cat.parentId))?.name || "—")
            : '<span style="color:#94a3b8">—</span>';
        const childCount = allCats.filter(c => Number(c.parentId) === Number(cat.id)).length;
        const img = cat.image
            ? `<img src="${cat.image}" class="sub-img" onerror="this.src='image/category-default.png'">`
            : `<div style="width:36px;height:36px;background:#f1f5f9;border-radius:6px;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:11px">N/A</div>`;

        return `
        <tr>
            <td style="color:#94a3b8;font-size:12px">${cat.id}</td>
            <td>${img}</td>
            <td style="font-weight:600">${esc(cat.name)}</td>
            <td>${parentName}</td>
            <td><span class="badge-type ${cat.parentId ? 'badge-sub' : ''}">${cat.parentId ? 'Con' : 'Cha'}</span></td>
            <td>
                ${!cat.parentId && childCount > 0
                    ? `<span style="background:#f0fdf4;color:#16a34a;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600">${childCount} danh mục con</span>`
                    : `<span style="color:#94a3b8;font-size:12px">${childCount > 0 ? childCount : "—"}</span>`
                }
            </td>
            <td>
                <div style="display:flex;gap:5px">
                    ${!cat.parentId ? `<button class="action-btn btn-sub" title="Thêm danh mục con" onclick="openAddChild(${cat.id})"><i class="fa-solid fa-plus"></i></button>` : ""}
                    <button class="action-btn btn-edit" title="Sửa" onclick="openEdit(${cat.id})"><i class="fa-solid fa-pen"></i></button>
                    <button class="action-btn btn-del"  title="Xóa" onclick="deleteCategory(${cat.id})"><i class="fa-solid fa-trash"></i></button>
                </div>
            </td>
        </tr>`;
    }).join("");

    renderPagination();
}

function renderPagination() {
    const total = Math.ceil(filteredCats.length / pageSize);
    const box = document.getElementById("pagination");
    if (total <= 1) { box.innerHTML = ""; return; }
    let html = "";
    for (let i = 0; i < total; i++) {
        html += `<button class="pg-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i + 1}</button>`;
    }
    box.innerHTML = html;
}

function goPage(p) { currentPage = p; render(); }

// ── Modal open helpers ────────────────────────────────────────────────────────
function resetModal() {
    document.getElementById("catId").value      = "";
    document.getElementById("catName").value    = "";
    document.getElementById("catParent").value  = "";
    document.getElementById("catType").value    = "";
    document.getElementById("catImgUrl").value  = "";
    document.getElementById("catImgFile").value = "";
    document.getElementById("catImgPreview").style.display = "none";
    fillParentSelect("");
}

function fillParentSelect(excludeId) {
    const sel = document.getElementById("catParent");
    const parents = allCats.filter(c => !c.parentId && String(c.id) !== String(excludeId));
    sel.innerHTML = '<option value="">-- Không có (là danh mục cha) --</option>';
    parents.forEach(c => {
        sel.innerHTML += `<option value="${c.id}">${esc(c.name)}</option>`;
    });
}

function openAdd(parentId) {
    resetModal();
    document.getElementById("modalTitle").textContent = "Thêm danh mục";
    if (parentId) {
        document.getElementById("catParent").value = parentId;
    }
    modalInstance.show();
}

function openAddChild(parentId) {
    resetModal();
    document.getElementById("modalTitle").textContent = "Thêm danh mục con";
    document.getElementById("catParent").value = parentId;
    modalInstance.show();
}

function openEdit(id) {
    const cat = allCats.find(c => Number(c.id) === Number(id));
    if (!cat) return;
    resetModal();
    document.getElementById("modalTitle").textContent = "Sửa danh mục";
    document.getElementById("catId").value     = cat.id;
    document.getElementById("catName").value   = cat.name || "";
    document.getElementById("catType").value   = cat.categoryType || "";
    document.getElementById("catImgUrl").value = cat.image || "";

    fillParentSelect(cat.id);
    if (cat.parentId) {
        document.getElementById("catParent").value = cat.parentId;
    }

    if (cat.image) {
        const preview = document.getElementById("catImgPreview");
        preview.src = cat.image;
        preview.style.display = "block";
    }
    modalInstance.show();
}

// ── Preview ảnh ──────────────────────────────────────────────────────────────
function previewCatImg(input) {
    const file = input.files[0];
    if (!file) return;
    const preview = document.getElementById("catImgPreview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
}

// ── Save ─────────────────────────────────────────────────────────────────────
async function saveCategory() {
    const name = document.getElementById("catName").value.trim();
    if (!name) { toastr.warning("Vui lòng nhập tên danh mục"); return; }

    // Upload ảnh nếu có file mới
    const fileInput = document.getElementById("catImgFile");
    let imageUrl = document.getElementById("catImgUrl").value;
    if (fileInput.files[0]) {
        try {
            const fd = new FormData();
            fd.append("file", fileInput.files[0]);
            const up = await fetch(UPLOAD_API, { method:"POST", body:fd });
            if (up.ok) imageUrl = await up.text();
        } catch(e) { toastr.error("Upload ảnh thất bại"); return; }
    }

    const idVal    = document.getElementById("catId").value;
    const parentId = document.getElementById("catParent").value;
    const type     = document.getElementById("catType").value;

    const payload = {
        id: idVal ? Number(idVal) : undefined,
        name,
        categoryType: type || undefined,
        image: imageUrl || undefined,
        parentId: parentId ? Number(parentId) : null
    };

    const token = localStorage.getItem("token");
    const headers = { "Content-Type":"application/json" };
    if (token) headers["Authorization"] = "Bearer " + token;

    try {
        const url = idVal ? `${API}/admin/update` : `${API}/admin/create`;
        const res = await fetch(url, {
            method:"POST",
            headers,
            credentials:"include",
            body: JSON.stringify(payload)
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            toastr.error(err.message || "Lưu thất bại"); return;
        }

        toastr.success(idVal ? "Cập nhật thành công!" : "Thêm danh mục thành công!");
        modalInstance.hide();
        await loadAllData();
    } catch(e) {
        console.error(e);
        toastr.error("Lỗi kết nối server");
    }
}

// ── Delete ───────────────────────────────────────────────────────────────────
async function deleteCategory(id) {
    const cat = allCats.find(c => Number(c.id) === Number(id));
    const childCount = allCats.filter(c => Number(c.parentId) === Number(id)).length;

    if (childCount > 0) {
        toastr.warning(`Danh mục này có ${childCount} danh mục con. Hãy xóa danh mục con trước.`);
        return;
    }

    if (!confirm(`Xóa danh mục "${cat?.name}"?`)) return;

    const token = localStorage.getItem("token");
    const headers = {};
    if (token) headers["Authorization"] = "Bearer " + token;

    try {
        const res = await fetch(`${API}/admin/delete?id=${id}`, { method:"DELETE", headers, credentials:"include" });
        if (!res.ok) { toastr.error("Xóa thất bại"); return; }
        toastr.success("Đã xóa danh mục!");
        await loadAllData();
    } catch(e) {
        toastr.error("Lỗi kết nối");
    }
}

function esc(str) {
    return str ? String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") : "";
}
</script>
</body>
</html>
